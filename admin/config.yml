local_backend: true
backend:
  name: github
  repo: superiorinnoctem/sinsite # 👈 LET OP: Vul hier jouw eigen GitHub naam en reponaam in!
  branch: main # Of 'master' als jullie repo zo heet

media_folder: "" # Laat leeg zodat foto's in de hoofdmap komen, net als nu!
public_folder: ""

collections:
  - name: "home"
    label: "🏠 Homepagina & Inhoud"
    files:
      - label: "⚙️ Homepagina Bewerken"
        name: "home_edit"
        file: "data/home.json"
        fields:
          - { label: "Bovenste Hero Foto", name: "hero_image", widget: "image" }
          - { label: "Titel over de foto", name: "hero_titel", widget: "string", default: "S.I.N." }
          
          - label: "📊 Tellers & Statistieken"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Nummer (Doel)", name: "doel", widget: "number" }
              - { label: "Plusje (+) erachter?", name: "plus", widget: "boolean", default: false }

          - { label: "🎵 Lied (Lichtkrant Tekst)", name: "lied_couplet", widget: "text" }
          
          - { label: "Titel 'Over Ons'", name: "over_titel", widget: "string" }
          - { label: "Tekst 'Over Ons'", name: "over_tekst", widget: "text" }
          
          - label: "🖼️ Fotocollage (Blokken-Doos)"
            name: "collage"
            widget: "list"
            label_singular: "Foto"
            fields:
              - { label: "Foto Uploaden", name: "afbeelding", widget: "image" }
              - { label: "Formaat in de collage", name: "formaat", widget: "select", options: ["img-normaal", "img-hoog", "img-breed"], default: "img-normaal" }
          
          - label: "📞 Contactgegevens Footer"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "E-mailadres", name: "email", widget: "string" }
              - { label: "Telefoonnummer Ab Actis", name: "tel_ab_actis", widget: "string" }
              - { label: "Telefoonnummer Overige Vragen", name: "tel_overig", widget: "string" }
