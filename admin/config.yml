local_backend: true
backend:
  name: github
  repo: superiorinnoctem/sinsite
  branch: main 

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "design"
    label: "🎨 Huisstijl & Vormgeving"
    files:
      - label: "Kleuren & Lettertypen"
        name: "huisstijl"
        file: "_data/design.json"
        fields:
          - { label: "Achtergrondkleur Website", name: "achtergrond_kleur", widget: "color" }
          - { label: "Accentkleur (Balken & Footer)", name: "accent_kleur", widget: "color" }
          - { label: "Algemene Tekstkleur", name: "tekst_kleur", widget: "color" }
          - { label: "Kopjes Lettertype", name: "titel_font", widget: "select", options: ["Racing Sans One", "Georgia", "Impact", "Arial"] }
          - { label: "Leestekst Lettertype", name: "body_font", widget: "select", options: ["Arial", "Helvetica", "Times New Roman", "Courier New"] }

  - name: "home"
    label: "🏠 Homepagina Beheren"
    files:
      - label: "Inhoud Homepagina"
        name: "home_content"
        file: "_data/home.json"
        fields:
          - { label: "Hero Achtergrond Foto", name: "hero_image", widget: "image" }
          - { label: "Grote Hero Titel", name: "hero_titel", widget: "string" }
          - label: "Tellers & Statistieken"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Aantal (Doelgetal)", name: "doel", widget: "number" }
              - { label: "Plusje (+) tonen?", name: "plus", widget: "boolean" }
          - { label: "Tekstblok 'Over Ons'", name: "over_tekst", widget: "text" }
          - label: "Fotocollage"
            name: "collage"
            widget: "list"
            fields:
              - { label: "Afbeelding Uploaden", name: "afbeelding", widget: "image" }
              - { label: "Formaat in Raster", name: "formaat", widget: "select", options: ["img-normaal", "img-hoog", "img-breed"] }
- name: "leden"
    label: "👥 (Oud-)Leden & Lichtingen"
    media_folder: "/assets/leden"
    public_folder: "/assets/leden"
    files:
      - label: "Beheer Ledenpagina"
        name: "leden_content"
        file: "_data/leden.json"
        fields:
          - { label: "Titel Actieve Leden", name: "titel", widget: "string", default: "Onze Leden" }
          
          - label: "🟢 Actieve Lichtingen (Met losse ronde foto's & studie)"
            name: "lichtingen"
            widget: "list"
            fields:
              - { label: "Naam van de Lichting (bijv. Lichting X)", name: "lichting_naam", widget: "string" }
              - label: "Leden in deze lichting"
                name: "leden"
                widget: "list"
                fields:
                  - { label: "Naam van het lid", name: "naam", widget: "string" }
                  - { label: "Studie", name: "studie", widget: "string" }
                  - { label: "Profielfoto Uploaden", name: "foto", widget: "image" }

          - { label: "Titel Oud-Leden Sectie", name: "alumni_titel", widget: "string", default: "Oud-Leden Vereniging" }

          - label: "🟡 Oud-Leden Oprichters (Bovenaan groot)"
            name: "oprichters"
            widget: "object"
            fields:
              - { label: "Titel (bijv. De Oprichters (2012))", name: "titel", widget: "string" }
              - { label: "Groepsfoto Uploaden", name: "foto", widget: "image" }
              - { label: "Namen op de foto (v.l.n.r.)", name: "namen", widget: "string" }
              - { label: "Missend op de foto", name: "missend", widget: "string", required: false }

          - label: "🟡 Oud-Leden Lichtingen (Met groepsfoto & namen)"
            name: "alumni_lichtingen"
            widget: "list"
            fields:
              - { label: "Naam Lichting (bijv. Lichting I)", name: "lichting_naam", widget: "string" }
              - { label: "Groepsfoto Uploaden", name: "foto", widget: "image" }
              - { label: "Namen op de foto (v.l.n.r.)", name: "namen", widget: "string" }
              - { label: "Missend op de foto (optioneel)", name: "missend", widget: "string", required: false }

  - name: "pages"
    label: "📑 Vrije Pagina's Toevoegen"
    folder: "content/pages"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Pagina Titel (Bijv: Lustrum)", name: "title", widget: "string" }
      - { label: "Web-link (Bijv: /lustrum)", name: "permalink", widget: "string", hint: "Begin altijd met een schuine streep, bijv: /lustrum/" }
      - { label: "Layout Model", name: "layout", widget: "hidden", default: "base.html" }
      - label: "🛠️ Visuele Blokken-Doos (Pagina Opbouwen)"
        name: "blocks"
        widget: "list"
        types:
          - name: "text_block"
            label: "📄 Tekstveld Toevoegen"
            fields:
              - { label: "Koptekst boven blok", name: "heading", widget: "string" }
              - { label: "Inhoud (Rijke tekst met links & dikgedrukt)", name: "content", widget: "markdown" }
          - name: "image_block"
            label: "🖼️ Grote Foto Toevoegen"
            fields:
              - { label: "Foto Selecteren / Uploaden", name: "image", widget: "image" }
              - { label: "Bijschrift onder foto", name: "caption", widget: "string" }
          - name: "cta_button"
            label: "🔘 Actieknop (Link naar formulier)"
            fields:
              - { label: "Tekst op de knop", name: "button_text", widget: "string" }
              - { label: "Waar moet de knop naartoe?", name: "button_link", widget: "string" }
